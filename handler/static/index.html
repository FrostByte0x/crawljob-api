<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>crawljob-api</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c0f;
      --surface:   #111418;
      --border:    #1e2530;
      --accent:    #00e5a0;
      --accent-dim:#00e5a022;
      --danger:    #ff4d6d;
      --danger-dim:#ff4d6d22;
      --text:      #e2e8f0;
      --muted:     #4a5568;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -20%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(circle, #00e5a015 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      gap: 2.5rem;
    }

    /* ── Nav bar ── */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.5rem 2rem;
      background: linear-gradient(to bottom, var(--bg) 60%, transparent);
    }

    .nav-logo {
      font-family: var(--mono);
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .nav-link {
      font-family: var(--mono);
      font-size: 1.44rem;
      color: var(--muted);
      text-decoration: none;
      letter-spacing: 0.1em;
      padding: 0.8rem 1.8rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .nav-link:hover {
      color: var(--accent);
      border-color: var(--accent);
      background: var(--accent-dim);
    }

    .nav-link .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    /* ── Header ── */
    header { text-align: center; }

    .logo {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .logo::before, .logo::after {
      content: '';
      display: block;
      width: 2rem; height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      color: var(--text);
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 0.6rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ── Card ── */
    .card {
      width: 100%;
      max-width: min(800px, 90vw);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.6;
    }

    .input-label {
      font-family: var(--mono);
      font-size: 1.4rem;
      color: var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
      display: block;
    }

    .input-row { display: flex; gap: 0.75rem; }

    input[type="url"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.1rem 1.25rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="url"]::placeholder { color: var(--muted); }
    input[type="url"]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    button[type="submit"] {
      background: var(--accent);
      color: #0a0c0f;
      border: none;
      border-radius: 10px;
      padding: 1.1rem 1.8rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.15s;
    }

    button[type="submit"]:hover  { opacity: 0.85; }
    button[type="submit"]:active { transform: scale(0.97); }
    button[type="submit"]:disabled { opacity: 0.4; cursor: not-allowed; }

    .status {
      margin-top: 1.25rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-family: var(--mono);
      font-size: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.6rem;
    }

    .status.success { background: var(--accent-dim); border: 1px solid var(--accent); color: var(--accent); }
    .status.error   { background: var(--danger-dim); border: 1px solid var(--danger);  color: var(--danger); }

    .status .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
    .status.success .dot { background: var(--accent); animation: pulse 1.5s infinite; }
    .status.error   .dot { background: var(--danger); }

    .card.success-flash {
      border-color: var(--accent);
      box-shadow: 0 0 30px var(--accent-dim), 0 0 60px var(--accent-dim);
    }
    .card.error-flash {
      border-color: var(--danger);
      box-shadow: 0 0 30px var(--danger-dim);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Footer ── */
    footer {
      font-family: var(--mono);
      font-size: 1.4rem;
      color: var(--muted);
      letter-spacing: 0.08em;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #0a0c0f;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>

<body>

  <!-- ── Top navigation ── -->
  <nav>
    <span class="nav-logo">crawljob-api</span>
    <a href="/downloads" class="nav-link">
      <span class="dot"></span>
      view downloads →
    </a>
  </nav>

  <main>
    <header>
      <div class="logo">crawljob-api</div>
      <h1>Queue a <span>download</span></h1>
      <p class="subtitle">// drop a link → jDownloader picks it up</p>
    </header>

    <div class="card"
         x-data="{
           url: '',
           loading: false,
           status: null,
           message: '',
           async submit() {
             if (!this.url) return;
             this.loading = true;
             this.status = null;
             try {
               const res = await fetch('/jobs', {
                 method: 'POST',
                 headers: { 'Content-Type': 'application/json' },
                 body: JSON.stringify({ url: this.url })
               });
               const text = await res.text();
               if (res.ok) {
                 this.status = 'success';
                 this.message = '✓ ' + text;
                 this.url = '';
                 this.$el.classList.add('success-flash');
                 setTimeout(() => this.$el.classList.remove('success-flash'), 800);
               } else {
                 this.status = 'error';
                 this.message = text;
                 this.$el.classList.add('error-flash');
                 setTimeout(() => this.$el.classList.remove('error-flash'), 800);
               }
             } catch(e) {
               this.status = 'error';
               this.message = 'Network error — is the server running?';
             } finally {
               this.loading = false;
             }
           }
         }"
    >
      <label class="input-label" for="url-input">download url</label>
      <div class="input-row">
        <input
          id="url-input"
          type="url"
          placeholder="https://1fichier.com/..."
          x-model="url"
          @keydown.enter="submit()"
          :disabled="loading"
        />
        <button type="submit" @click="submit()" :disabled="loading || !url">
          <span x-show="!loading">→ send</span>
          <span x-show="loading"><span class="spinner"></span></span>
        </button>
      </div>

      <div class="status success" x-show="status === 'success'" x-cloak>
        <span class="dot"></span>
        <span x-text="message"></span>
      </div>
      <div class="status error" x-show="status === 'error'" x-cloak>
        <span class="dot"></span>
        <span x-text="message"></span>
      </div>
    </div>

    <footer>
      built with Go + Alpine.js &mdash;
      <a href="https://github.com/FrostByte0x/crawljob-api" target="_blank">github</a>
    </footer>
  </main>

  <style>[x-cloak] { display: none !important; }</style>
</body>
</html>
