<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>crawljob-api — downloads</title>
  <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0c0f;
      --surface:   #111418;
      --surface2:  #161b22;
      --border:    #1e2530;
      --accent:    #00e5a0;
      --accent-dim:#00e5a018;
      --danger:    #ff4d6d;
      --text:      #e2e8f0;
      --muted:     #4a5568;
      --mono:      'JetBrains Mono', monospace;
      --sans:      'Syne', sans-serif;
    }

    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -20%; left: 50%;
      transform: translateX(-50%);
      width: 700px; height: 700px;
      background: radial-gradient(circle, #00e5a012 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      max-width: min(1100px, 92vw);
      margin: 0 auto;
      padding: 3rem 0 4rem;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }

    .logo {
      font-family: var(--mono);
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .logo::before {
      content: '';
      display: block;
      width: 1.5rem; height: 1px;
      background: var(--accent);
      opacity: 0.5;
    }

    .nav-link {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      text-decoration: none;
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      transition: all 0.2s;
    }
    .nav-link:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-dim); }

    /* ── Header ── */
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      margin-bottom: 0.4rem;
    }
    h1 span { color: var(--accent); }

    .subtitle {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.5rem;
    }

    .search-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text);
      outline: none;
      flex: 1;
      max-width: 360px;
      transition: border-color 0.2s;
    }
    .search-input::placeholder { color: var(--muted); }
    .search-input:focus { border-color: var(--accent); }

    .folder-count {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: auto;
    }
    .folder-count span { color: var(--accent); }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.6rem 1rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Folder cards ── */
    .folders { display: flex; flex-direction: column; gap: 0.75rem; }

    .folder-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .folder-card:hover { border-color: #2a3545; }

    /* ── Folder header ── */
    .folder-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.25rem;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
      position: relative;
    }

    .folder-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.3;
    }

    .folder-header:hover { background: var(--accent-dim); }

    .folder-left {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .folder-icon {
      font-size: 1rem;
      transition: transform 0.2s;
    }

    .folder-name {
      font-family: var(--sans);
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .folder-meta {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      margin-left: 0.5rem;
    }

    .folder-right {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .chevron {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      transition: transform 0.25s;
    }

    .chevron.open { transform: rotate(90deg); }

    /* ── File list inside folder ── */
    .file-list {
      border-top: 1px solid var(--border);
    }

    .file-row {
      display: flex;
      align-items: center;
      padding: 0.7rem 1.25rem 0.7rem 2.75rem;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      gap: 0.75rem;
    }

    .file-row:last-child { border-bottom: none; }
    .file-row:hover { background: var(--accent-dim); }

    .file-name {
      font-family: var(--mono);
      font-size: 0.8rem;
      color: var(--text);
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .ext-tag {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 0.25rem 0.65rem;
      border-radius: 4px;
      border: 1px solid var(--accent);
      flex-shrink: 0;
      letter-spacing: 0.05em;
    }

    .file-size {
      font-family: var(--mono);
      font-size: 0.9rem;
      color: var(--text);
      flex-shrink: 0;
      min-width: 6rem;
      text-align: right;
    }

    /* ── Download folder button ── */
    .dl-folder-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.35rem 1rem;
      background: transparent;
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 700;
      text-decoration: none;
      letter-spacing: 0.05em;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .dl-folder-btn:hover {
      background: var(--accent);
      color: #0a0c0f;
      box-shadow: 0 0 20px var(--accent-dim);
    }

        /* ── Download button ── */
    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.3rem 0.8rem;
      background: var(--accent-dim);
      border: 1px solid var(--accent);
      border-radius: 6px;
      color: var(--accent);
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 600;
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .dl-btn:hover {
      background: var(--accent);
      color: #0a0c0f;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px var(--accent-dim);
    }

    /* ── Empty folder ── */
    .empty-folder {
      padding: 1rem 1.25rem 1rem 2.75rem;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--muted);
      border-top: 1px solid var(--border);
    }

    /* ── States ── */
    .state-box {
      text-align: center;
      padding: 4rem 2rem;
      font-family: var(--mono);
      font-size: 0.85rem;
      color: var(--muted);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      margin-top: 2rem;
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }
  </style>
</head>

<body>
  <div class="page"
    x-data="{
      raw: {},
      loading: true,
      error: null,
      search: '',

      get folders() {
        const entries = Object.entries(this.raw);
        if (!this.search) return entries;
        const q = this.search.toLowerCase();
        return entries
          .map(([name, files]) => [
            name,
            files.filter(f => f.name.toLowerCase().includes(q) || name.toLowerCase().includes(q))
          ])
          .filter(([name, files]) => files.length > 0 || name.toLowerCase().includes(q));
      },

      downloadUrl(path) {
        return '/download?filename=' + encodeURIComponent(path);
      },

      async load() {
        this.loading = true;
        this.error = null;
        try {
          const res = await fetch('/api/files');
          if (!res.ok) throw new Error('HTTP ' + res.status);
          this.raw = await res.json();
        } catch(e) {
          this.error = e.message;
        } finally {
          this.loading = false;
        }
      }
    }"
    x-init="load()"
  >

    <nav>
      <div class="logo">crawljob-api</div>
      <a href="/" class="nav-link">← back to submit</a>
    </nav>

    <h1>Download <span>library</span></h1>
    <p class="subtitle">// contents of DESTINATION_FOLDER</p>

    <div class="toolbar">
      <input
        class="search-input"
        type="text"
        placeholder="search folders or files..."
        x-model="search"
      />
      <span class="folder-count" x-show="!loading && !error">
        <span x-text="folders.length"></span> folder(s)
      </span>
      <button class="refresh-btn" @click="load()" :disabled="loading">↻ refresh</button>
    </div>

    <!-- Loading -->
    <div class="state-box" x-show="loading">
      <span class="spinner"></span> loading library...
    </div>

    <!-- Error -->
    <div class="state-box" x-show="!loading && error" x-cloak style="color: var(--danger)">
      ✗ <span x-text="error"></span>
    </div>

    <!-- Empty -->
    <div class="state-box" x-show="!loading && !error && folders.length === 0" x-cloak>
      no folders found
    </div>

    <!-- Folder list -->
    <div class="folders" x-show="!loading && !error && folders.length > 0" x-cloak>
      <template x-for="[folderName, files] in folders" :key="folderName">
        <div class="folder-card" x-data="{ open: true }">

          <!-- Folder header -->
          <div class="folder-header" @click="open = !open">
            <div class="folder-left">
              <span class="folder-icon" x-text="open ? '📂' : '📁'"></span>
              <span class="folder-name" x-text="folderName"></span>
              <span class="folder-meta" x-text="files.length + ' file(s)'"></span>
            </div>
            <div class="folder-right">
              <a
                :href="'/download/folder?folder=' + encodeURIComponent(folderName)"
                class="dl-folder-btn"
                @click.stop
              >
                ⬇ download all
              </a>
              <span class="chevron" :class="{ open }">›</span>
            </div>
          </div>

          <!-- File list -->
          <div class="file-list" x-show="open" x-collapse>

            <div x-show="files.length === 0" class="empty-folder">
              — no files
            </div>

            <template x-for="file in files" :key="file.path">
              <div class="file-row">
                <span class="file-name" x-text="file.name"></span>
                <span class="ext-tag" x-text="file.extension"></span>
                <span class="file-size" x-text="file.size"></span>
                <a :href="downloadUrl(file.path)" class="dl-btn">⬇ download</a>
              </div>
            </template>

          </div>
        </div>
      </template>
    </div>

    <footer>
      <a href="https://github.com/FrostByte0x/crawljob-api" target="_blank">github.com/FrostByte0x/crawljob-api</a>
    </footer>
  </div>

  <style>[x-cloak] { display: none !important; }</style>
</body>
</html>
